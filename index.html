<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tools Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;800&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --card-hover: rgba(255,255,255,0.1);
  --text: #e8e6e1;
  --text-sub: #8a8880;
  --accent-1: #6c63ff;
  --accent-2: #00d4aa;
  --accent-3: #ff6b6b;
  --accent-4: #ffd43b;
  --accent-5: #4dabf7;
  --accent-6: #f06595;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.bg-glow {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}

.glow-1 { top: -200px; left: -100px; background: var(--accent-1); }
.glow-2 { bottom: -200px; right: -100px; background: var(--accent-2); }

.container {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 60px 24px 80px;
}

header {
  text-align: center;
  margin-bottom: 60px;
  animation: fadeUp 0.8s ease;
}

header h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -1.5px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, #aaa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  color: var(--text-sub);
  font-size: 16px;
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.status-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 24px;
  font-size: 13px;
  color: var(--text-sub);
}

.status-bar span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent-2);
  display: inline-block;
  animation: pulse 2s infinite;
}

.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.tool-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 28px 24px;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  display: block;
  animation: fadeUp 0.6s ease both;
}

.tool-card:nth-child(1) { animation-delay: 0.1s; }
.tool-card:nth-child(2) { animation-delay: 0.18s; }
.tool-card:nth-child(3) { animation-delay: 0.26s; }
.tool-card:nth-child(4) { animation-delay: 0.34s; }
.tool-card:nth-child(5) { animation-delay: 0.42s; }
.tool-card:nth-child(6) { animation-delay: 0.50s; }

.tool-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--card-accent);
  opacity: 0;
  transition: opacity 0.35s;
}

.tool-card:hover {
  background: var(--card-hover);
  border-color: rgba(255,255,255,0.15);
  transform: translateY(-4px);
}

.tool-card:hover::before { opacity: 1; }

.card-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 18px;
  background: var(--icon-bg);
}

.tool-card h3 {
  font-family: 'Outfit', sans-serif;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}

.tool-card p {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.5;
  font-weight: 300;
}

.card-tag {
  display: inline-block;
  margin-top: 14px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.06);
  color: var(--text-sub);
}

.empty-card {
  border-style: dashed;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 180px;
  color: var(--text-sub);
  gap: 8px;
}

.empty-card .plus {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: var(--text-sub);
}

.empty-card span {
  font-size: 13px;
  font-weight: 300;
}

footer {
  text-align: center;
  margin-top: 60px;
  color: var(--text-sub);
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 1px;
  animation: fadeUp 0.8s ease 0.6s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@media (max-width: 640px) {
  .container { padding: 40px 16px 60px; }
  header h1 { font-size: 30px; }
  .tools-grid { grid-template-columns: 1fr; }
  .status-bar { gap: 16px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<div class="container">
  <header>
    <h1>My Tools</h1>
    <p>Personal Dashboard</p>
    <div class="status-bar">
      <span><i class="status-dot"></i> Online</span>
      <span>도구 3개 등록됨</span>
    </div>
  </header>

  <div class="tools-grid">

    <a class="tool-card" href="단가표_공유용.html" style="--card-accent: var(--accent-1); --icon-bg: rgba(108,99,255,0.15);">
      <div class="card-icon" style="color: var(--accent-1);">📊</div>
      <h3>단가표</h3>
      <p>단가표 공유용 페이지</p>
      <span class="card-tag">업무</span>
    </a>

    <a class="tool-card" href="timer.html" style="--card-accent: var(--accent-2); --icon-bg: rgba(0,212,170,0.15);">
      <div class="card-icon" style="color: var(--accent-2);">◷</div>
      <h3>타이머</h3>
      <p>집중 시간 관리를 위한 포모도로 타이머</p>
      <span class="card-tag">생산성</span>
    </a>

    <a class="tool-card" href="memo.html" style="--card-accent: var(--accent-4); --icon-bg: rgba(255,212,59,0.15);">
      <div class="card-icon" style="color: var(--accent-4);">✎</div>
      <h3>메모장</h3>
      <p>빠르게 메모하고 저장할 수 있는 간편 노트</p>
      <span class="card-tag">메모</span>
    </a>

    <div class="tool-card empty-card">
      <div class="plus">+</div>
      <span>새 도구 추가</span>
    </div>

  </div>

  <footer>
    Powered by Claude &times; GitHub Pages
  </footer>
</div>

</body>
</html>
