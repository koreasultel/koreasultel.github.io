<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>리베이트 단가조회</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22222f;--border:#2a2a3a;--text:#e8e8f0;--muted:#6b6b88;--muted2:#3a3a52;--blue:#4f8ef7;--green:#2ecc8a;--orange:#f0883e;--purple:#c084fc;--red:#ff5a5a;--ylw:#f5c842;--skt:#ff4d6d;--kt:#ff8080;--lgu:#b47fff;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;background:var(--bg);color:var(--text);font-family:Pretendard,sans-serif;overflow:hidden;}
header{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;}
.logo{font-size:15px;font-weight:900;white-space:nowrap;}.logo b{color:var(--green);}
.sbox{flex:1;max-width:320px;position:relative;}
.sbox input{width:100%;padding:8px 12px 8px 32px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;font-size:13px;outline:none;}
.sbox input:focus{border-color:var(--blue);}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.hright{display:flex;gap:5px;margin-left:auto;align-items:center;}
.upbtn{position:relative;padding:6px 9px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid;white-space:nowrap;user-select:none;}
.upbtn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.upbtn.sj{border-color:var(--skt);color:var(--skt);background:#1a0008;}
.upbtn.c1{border-color:#ff9494;color:#ff9494;background:#200005;}
.upbtn.su{border-color:#d07ff0;color:#d07ff0;background:#0e0020;}
.upbtn.kh{border-color:var(--kt);color:var(--kt);background:#1a0808;}
.upbtn.kb{border-color:var(--ylw);color:var(--ylw);background:#1a1200;}
.upbtn.lg{border-color:var(--lgu);color:var(--lgu);background:#120818;}
.upbtn.done{opacity:.5;}.upbtn:hover{filter:brightness(1.2);}
.upst{font-size:11px;color:var(--green);white-space:nowrap;}
.wrap{display:flex;height:calc(100vh - 54px);}
.sidebar{width:245px;min-width:225px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sbhead{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sblbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;}
.sbcnt{font-family:monospace;font-size:11px;color:var(--blue);}
.devlist{flex:1;overflow-y:auto;}
.dgroup{border-bottom:1px solid #1c1c28;}
.dmain{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:7px;}
.dmain:hover{background:var(--bg3);}.dmain.open{background:#0d1a2a;}.dmain.hassel{background:#0a1f12;border-left:3px solid var(--green);padding-left:9px;}
.dname{font-size:12px;font-weight:700;flex:1;line-height:1.3;}
.dots{display:flex;gap:3px;}.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.cdot.SKT{background:var(--skt);}.cdot.KT{background:var(--kt);}.cdot.LGU{background:var(--lgu);}
.tbadge{font-size:9px;padding:1px 4px;border-radius:3px;background:var(--bg4);color:var(--muted2);}
.dmodel{font-size:9px;color:var(--muted2);margin-top:1px;}
.dhmodel{font-size:11px;color:var(--muted);margin-left:2px;}
.darrow{font-size:9px;color:var(--muted2);transition:transform .2s;}.dmain.open .darrow{transform:rotate(90deg);}
.szlist{display:none;background:#0c0c14;}.szlist.open{display:block;}
.szitem{padding:7px 12px 7px 28px;cursor:pointer;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.szitem:hover{color:var(--text);background:var(--bg3);}.szitem.sel{color:var(--green);font-weight:700;}
.szitem:before{content:"L";color:var(--muted2);}
.szprice{margin-left:auto;font-family:monospace;font-size:9px;color:var(--muted2);}
.result{flex:1;overflow-y:auto;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);text-align:center;}
.empty .big{font-size:48px;}.empty h2{font-size:15px;font-weight:700;color:var(--text);}.empty p{font-size:12px;color:var(--muted2);line-height:1.7;}
.devhd{padding:13px 20px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.dhname{font-size:18px;font-weight:900;}.szbadge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:15px;background:#0a2010;color:var(--green);border:1px solid var(--green);}
.dhprice{font-family:monospace;font-size:11px;color:var(--muted);}
.capill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:15px;}
.capill.SKT{background:#1a0008;color:var(--skt);border:1px solid var(--skt);}
.capill.KT{background:#1a0808;color:var(--kt);border:1px solid var(--kt);}
.capill.LGU{background:#120818;color:var(--lgu);border:1px solid var(--lgu);}
.dlrblock{border-bottom:2px solid var(--border);}
.dlrhd{padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:55px;z-index:40;}
.dlrhd.sj{background:linear-gradient(90deg,#1f0010,#100010);}.dlrhd.c1{background:linear-gradient(90deg,#230006,#160003);}
.dlrhd.su{background:linear-gradient(90deg,#0f0022,#080018);}.dlrhd.kh{background:linear-gradient(90deg,#1e0808,#120505);}
.dlrhd.kb{background:linear-gradient(90deg,#1e1400,#120e00);}.dlrhd.lg{background:linear-gradient(90deg,#0f0022,#060014);}
.dbadge{font-size:12px;font-weight:800;padding:3px 10px;border-radius:7px;}
.dbadge.sj{background:#280010;color:var(--skt);border:1.5px solid var(--skt);}
.dbadge.c1{background:#3a0000;color:#ff9494;border:1.5px solid #880000;}
.dbadge.su{background:#180830;color:#d07ff0;border:1.5px solid #7a3fc0;}
.dbadge.kh{background:#1a0808;color:var(--kt);border:1.5px solid var(--kt);}
.dbadge.kb{background:#1a1200;color:var(--ylw);border:1.5px solid var(--ylw);}
.dbadge.lg{background:#10082a;color:var(--lgu);border:1.5px solid var(--lgu);}
.dnote{font-size:10px;color:var(--muted);margin-left:auto;}
.hidtag{font-size:10px;font-weight:700;color:var(--orange);background:#180e00;padding:2px 8px;border-radius:5px;border:1px solid #3a2000;}
.tottag{font-size:11px;font-weight:800;color:var(--green);background:#001a08;padding:3px 10px;border-radius:7px;border:1.5px solid var(--green);font-family:monospace;}
.editbtn{padding:3px 9px;border-radius:5px;background:var(--bg4);border:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.editbtn:hover{color:var(--blue);border-color:var(--blue);}
.addwrap{position:relative;display:inline-block;}
.addtag{font-size:10px;font-weight:600;color:var(--purple);background:#0c0016;padding:2px 8px;border-radius:5px;border:1px solid #280048;display:inline-flex;align-items:center;gap:3px;}
.exmark{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:var(--purple);color:#fff;font-size:8px;font-weight:900;cursor:help;}
.tip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--purple);border-radius:9px;padding:9px 13px;font-size:11px;color:#ddd;white-space:nowrap;z-index:300;min-width:180px;line-height:1.7;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.7);}
.tip:after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a1a2e;}
.addwrap:hover .tip{display:block;}
.price-section{padding:14px 20px 22px;}
.ptable{width:100%;border-collapse:collapse;font-size:12px;}
.ptable th{padding:6px 10px;background:var(--bg3);color:var(--muted);font-size:10px;font-weight:700;text-align:center;border-bottom:2px solid var(--border);}
.ptable th.pth-plan{text-align:left;color:var(--text);font-size:11px;}
.ptable th.ghead-s{color:var(--blue);border-right:2px solid var(--border);}
.ptable th.ghead-a{color:var(--green);}
.ptable th.tot-head-s{color:#58a6ffcc;border-right:2px solid var(--border);}
.ptable th.tot-head-a{color:#00ff88cc;}
.ptable td{padding:7px 10px;border-bottom:1px solid #1e1e2a;text-align:center;}
.ptable td.plan-cell{text-align:left;font-size:11px;font-weight:600;}
.ptable tr:hover td{background:rgba(88,166,255,.04);}
.rv{font-family:monospace;font-size:13px;font-weight:700;}
.rv.t{color:#00ff88;}.rv.h{color:var(--green);}.rv.m{color:var(--ylw);}.rv.l{color:var(--muted);}.rv.z{color:var(--muted2);}
.tot-s{font-family:monospace;font-size:15px;font-weight:900;color:#58a6ff;background:#0d1f33;padding:3px 9px;border-radius:6px;}
.tot-a{font-family:monospace;font-size:15px;font-weight:900;color:#00ff88;background:#001a0d;padding:3px 9px;border-radius:6px;}
.img-box{position:relative;display:inline-block;max-width:100%;}
.dlr-img{max-width:100%;border-radius:10px;border:1px solid var(--border);display:block;cursor:zoom-in;}
.dlr-img:hover{box-shadow:0 0 0 2px var(--blue);}
.img-replace{position:absolute;top:8px;right:8px;background:rgba(10,10,15,.88);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;backdrop-filter:blur(8px);}
.img-replace:hover{color:var(--text);border-color:var(--blue);}
.img-replace input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.ai-area{padding:32px 20px;text-align:center;border:2px dashed var(--border);border-radius:12px;background:var(--bg3);}
.ai-area p{font-size:12px;color:var(--muted);margin-bottom:14px;}
.ai-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:var(--bg4);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text);font-family:inherit;position:relative;}
.ai-btn:hover{border-color:var(--blue);color:var(--blue);}
.ai-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.mbox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:26px;width:460px;max-width:95vw;max-height:88vh;overflow-y:auto;}
.mtitle{font-size:15px;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
.mclose{cursor:pointer;color:var(--muted);font-size:18px;}.mclose:hover{color:var(--text);}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.mrow label{font-size:12px;color:var(--muted);width:80px;flex-shrink:0;}
.minput{flex:1;padding:8px 10px;background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:12px;outline:none;}
.minput:focus{border-color:var(--blue);}
.mnuminput{width:60px;flex:none;padding:7px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:12px;outline:none;}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.mbtn{padding:9px 22px;border-radius:9px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.mbtn.save{background:var(--green);color:#000;}.mbtn.cancel{background:var(--bg4);color:var(--muted);border:1px solid var(--border);}
.msec{margin-bottom:16px;}
.msectitle{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.addoncard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.addonrow{display:flex;align-items:center;gap:8px;margin-bottom:8px;}.addonrow:last-child{margin-bottom:0;}
.exlabel{font-size:10px;color:var(--purple);width:55px;flex-shrink:0;}
.delbtn{width:24px;height:24px;border-radius:6px;background:#2a0010;border:1px solid var(--skt);color:var(--skt);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.addbtn{padding:5px 10px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit;}
.addbtn:hover{color:var(--text);border-color:var(--blue);}
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out;}
#lb.on{display:flex;}#lb img{max-width:96vw;max-height:96vh;border-radius:8px;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<header>
  <div class="logo">&#128176; <b>리베이트</b> 단가조회</div>
  <div class="sbox"><span class="sico">&#128269;</span><input id="sq" placeholder="기종 검색..." oninput="renderList()"></div>
  <div class="hright">
    <label class="upbtn sj">&#128202; SK정원<input type="file" accept=".xlsx" onchange="loadExcel(this,'sj')"></label>
    <label class="upbtn c1">&#128202; C1<input type="file" accept=".xlsx" onchange="loadExcel(this,'c1')"></label>
    <label class="upbtn su">&#128202; 유원<input type="file" accept=".xlsx" onchange="loadExcel(this,'su')"></label>
    <label class="upbtn kh">&#128202; HCK<input type="file" accept=".xlsx" onchange="loadExcel(this,'kh')"></label>
    <label class="upbtn kb">&#128202; 반추<input type="file" accept=".xlsx" onchange="loadExcel(this,'kb')"></label>
    <label class="upbtn lg">&#128202; 가온<input type="file" accept=".xlsx" onchange="loadExcel(this,'lg')"></label>
    <span class="upst" id="upst"></span>
  </div>
</header>
<div class="wrap">
  <div class="sidebar">
    <div class="sbhead"><span class="sblbl">기종 목록 (최신순)</span><span class="sbcnt" id="cnt">0개</span></div>
    <div class="devlist" id="devlist"></div>
  </div>
  <div class="result" id="result">
    <div class="empty"><div class="big">&#128241;</div><h2>기종을 선택하세요</h2><p>각 딜러 엑셀 파일 업로드 후 기종 클릭하면<br>깔끔한 수치 표가 바로 표시됩니다!</p></div>
  </div>
</div>
<div class="overlay" id="editOverlay">
  <div class="mbox">
    <div class="mtitle"><span id="mtitleText">딜러 편집</span><span class="mclose" onclick="closeEdit()">&#10005;</span></div>
    <div class="msec">
      <div class="msectitle">기본 정보</div>
      <div class="mrow"><label>딜러명</label><input class="minput" type="text" id="ed_name"></div>
      <div class="mrow"><label>히든</label><input class="mnuminput" type="number" id="ed_hidden" min="0" max="99"><span style="font-size:12px;color:#6b6b88;margin-left:4px">만원</span></div>
      <div class="mrow"><label>날짜/호수</label><input class="minput" type="text" id="ed_note"></div>
    </div>
    <div class="msec">
      <div class="msectitle">부가서비스 <button class="addbtn" onclick="addAddon()">+ 추가</button></div>
      <div id="addonArea"></div>
    </div>
    <div class="mfooter"><button class="mbtn cancel" onclick="closeEdit()">취소</button><button class="mbtn save" onclick="saveEdit()">저장</button></div>
  </div>
</div>
<div id="lb" onclick="this.classList.remove('on')"><img id="lbimg" src=""></div>

function loadExcel(input,id){
  var file=input.files[0];if(!file)return;
  var st=document.getElementById("upst");st.textContent="읽는 중...";
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:"array"});
      var sn=wb.SheetNames.find(function(n){return n==="지원";})||wb.SheetNames[0];
      var rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:""});
      var dl=DEALERS.find(function(d){return d.id===id;});
      var cfg=PLAN_CFG[id]||PLAN_CFG.sj;
      var plans=cfg.plans;
      var bases=cfg.bases;
      var modelMap=cfg.map;
      var cnt=0;
      rows.forEach(function(row){
        if(!row[0]||isNaN(parseInt(row[0])))return;
        var key=modelMap[String(row[1]).trim()];if(!key)return;
        function gd(b){return[b,b+3,b+1,b+4,b+2,b+5].map(function(c){var v=parseInt(row[c]);return isNaN(v)?0:v;});}
        dl.excel[key]=plans.map(function(pn,pi){var d=gd(bases[pi]);return{plan:pn,s신규:d[0],sMNP:d[2],s기변:d[4],a신규:d[1],aMNP:d[3],a기변:d[5],warn:[]};});
        cnt++;
      });
      st.textContent=dl.name+" "+cnt+"개 OK";st.style.color="#2ecc8a";
      setTimeout(function(){st.textContent="";},2500);
      if(SEL_K)showResult();
    }catch(err){st.textContent="오류: "+err.message;st.style.color="#ff5a5a";}
    input.value="";
  };
  reader.readAsArrayBuffer(file);
}
